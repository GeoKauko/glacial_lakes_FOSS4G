name: glacial_lakes
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy
  - rasterio
  - geopandas
  - shapely
  - scikit-image
  - scipy
  - matplotlib
  - tqdm
  - jupyter
  - pandas
  - pyarrow
  - pyproj 
  - ipykernel
  - xarray>=2025.1
  - rioxarray
  - pip
  - pip:
      - earthengine-api
      - geemap
      - openeo
      - xvec>=0.3
      - xproj>=0.1